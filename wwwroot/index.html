<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PUNTO 4 Clickdummy</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="main-wrapper">
        <h1>ecat PUNTO4 Trainer</h1>

        <div id="panel-container">
            <div id="control-panel">
                <div id="display-area">
                    <button id="stecker-btn">
                        <div class="pin-row">
                            <span class="pin"></span>
                            <span class="pin"></span>
                            <span class="pin"></span>
                            <span class="pin"></span>
                            <span class="pin"></span>
                        </div>
                        <div class="pin-row lower-row">
                            <span class="pin"></span>
                            <span class="pin"></span>
                            <span class="pin"></span>
                            <span class="pin"></span>
                        </div>
                    </button>

                    <div id="display-logo">ecat<br>punto 4</div>
                    <div id="display-screen"></div>
                </div>

                <div id="left-keys">
                    <button class="f-key-btn" data-key="F1" style="grid-column: 1;">F1</button>
                    <button class="f-key-btn" data-key="F2" style="grid-column: 2;">F2</button>
                    <button class="f-key-btn" data-key="F3" style="grid-column: 3;">F3</button>
                    <button class="f-key-btn" data-key="F4" style="grid-column: 4;">F4</button>

                    <button class="f-key-btn" data-key="HAND1" style="grid-column: 1;"><span class="icon">✋</span></button>
                    <button class="f-key-btn" data-key="HAND2" style="grid-column: 2;"><span class="icon">✋</span></button>
                    <button class="f-key-btn" data-key="HAND3" style="grid-column: 3;"><span class="icon">✋</span></button>
                    <button class="f-key-btn" data-key="HAND4" style="grid-column: 4;"><span class="icon">✋</span></button>

                    <button id="stop-btn" data-key="STOP">STOP</button>
                </div>

                <div id="right-keys">
                    <button class="key-btn" data-key="1">1</button>
                    <button class="key-btn" data-key="2">2</button>
                    <button class="key-btn" data-key="3">3</button>
                    <button class="key-btn" data-key="MINUS">-</button>

                    <button class="key-btn" data-key="4">4</button>
                    <button class="key-btn" data-key="5">5</button>
                    <button class="key-btn" data-key="6">6</button>
                    <button class="key-btn" data-key="PLUS">+</button>

                    <button class="key-btn" data-key="7">7</button>
                    <button class="key-btn" data-key="8">8</button>
                    <button class="key-btn" data-key="9">9</button>
                    <button class="key-btn" data-key="ARROW_LEFT">←</button>

                    <button class="key-btn" data-key="SEC_FUNC">sec.<br>func.</button>
                    <button class="key-btn" data-key="ESC">ESC</button>
                    <button class="key-btn" data-key="HELP">HELP</button>

                    <button class="key-btn" data-key="0">0</button>
                    <button class="key-btn" data-key="ENTER">↲</button>
                </div>
            </div>

            <div id="status-overlay">
                <h3>SIMULIERTER GLOCKENSTUHL-STATUS</h3>
                <div id="status-content"></div>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>

</body>
</html>
